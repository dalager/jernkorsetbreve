name: Deploy Static Site to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install public-site dependencies
        run: cd apps/website && npm ci

      - name: Build static site
        run: cd apps/website && npm run build

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/website/out --project-name=jernkorsetbreve
