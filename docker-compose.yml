# Jernkorset - Docker Compose Configuration
# Local development environment for the letter collection webapp
#
# Usage:
#   docker compose up              # Start all services
#   docker compose up -d           # Start in detached mode
#   docker compose up admin        # Start only the admin app
#   docker compose logs -f         # Follow logs
#   docker compose down            # Stop all services
#
# Testing:
#   docker compose run --rm e2e    # Run E2E tests
#   docker compose --profile test up  # Start services + run tests
#
# Services:
#   - admin:       Node.js admin app — Express API + React SPA (port 3000)
#   - public-site: Next.js public site (port 3001)
#   - e2e:         Playwright E2E tests (profile: test)

services:
  # Node.js Admin App (Express API + React SPA) — ADR-054
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: jernkorset-admin
    ports:
      - "3000:3000"
    environment:
      - REGISTRY_DIR=/data
      - CSV_DIR=/app/data
      - IMAGES_DIR=/data/images
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      # Mount canonical data directory (registries + images)
      - ./data:/data
      # Mount admin-local CSV data
      - ./apps/admin/data:/app/data:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Next.js Public Site
  website:
    build:
      context: ./apps/website
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000/api
        - NEXT_PUBLIC_GIT_SHA=${GIT_SHA:-dev}
        - NEXT_PUBLIC_BUILD_DATE=${BUILD_DATE:-dev}
    container_name: jernkorset-website
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
    depends_on:
      admin:
        condition: service_healthy
    restart: unless-stopped

  # E2E Tests (Playwright)
  e2e:
    build:
      context: ./tests/e2e
      dockerfile: Dockerfile
    container_name: jernkorset-e2e
    environment:
      - FRONTEND_URL=http://admin:3000
      - API_URL=http://admin:3000/api
      - SKIP_MODERNIZATION=true
    depends_on:
      admin:
        condition: service_healthy
    networks:
      - default
    profiles:
      - test
    command: >
      sh -c "
        echo 'Waiting for admin to be ready...' &&
        sleep 5 &&
        npx playwright test --reporter=list
      "

# Network configuration
networks:
  default:
    name: jernkorset-network
